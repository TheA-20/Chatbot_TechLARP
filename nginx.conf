# ─────────────────────────────────────────────────────────────
# nginx.conf — TechLARP Chatbot
# Servidor: 163.117.137.118
# Accesible en: http://163.117.137.118  (intranet UC3M / VPN)
# Futuro dominio público: https://dei.inf.uc3m.es/techlarp-chatbot
# ─────────────────────────────────────────────────────────────

# Redirigir HTTP a HTTPS cuando el dominio esté activo
# (Descomentar cuando se configure el dominio y certbot)
# server {
#     listen 80;
#     server_name dei.inf.uc3m.es;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # Acepta conexiones por IP directa y por futuro dominio
    server_name 163.117.137.118 dei.inf.uc3m.es _;

    # Tamaño máximo de archivos subidos
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/edularp-access.log;
    error_log  /var/log/nginx/edularp-error.log;

    # ── Proxy al proceso Next.js (PM2 en puerto 3000) ──
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Cache de assets estáticos de Next.js ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Archivos subidos por docentes ──
    location /uploads/ {
        alias /var/www/edularp-app/public/uploads/;
        expires 7d;
    }
}

