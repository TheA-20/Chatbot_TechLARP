services:
  db:
    image: pgvector/pgvector:pg16
    container_name: edularp-db
    environment:
      POSTGRES_DB: edularp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "&XL)7]1ttpEKQ:Na#L_]"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edularp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edularp-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
